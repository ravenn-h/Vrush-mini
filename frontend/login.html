<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vrush-mini — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #7c2d9e;
      --primary-dark: #5b1a80;
      --secondary: #b07dd6;
      --danger: #ef4444;
      --dark: #1e062a;
      --darker: #130118;
      --light: #f8fafc;
      --gray: #a367b8;
      --gray-light: #d8a8ec;
      --card-bg: rgba(43, 13, 61, 0.75);
      --card-border: #6b2185;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--darker);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ── Background orbs ── */
    .bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: drift linear infinite; }
    .orb1 { width: 450px; height: 450px; background: #7c2d9e; top: -120px; left: -120px; animation-duration: 20s; }
    .orb2 { width: 300px; height: 300px; background: #7c3aed; bottom: -80px; right: -60px; animation-duration: 24s; animation-direction: reverse; }
    .orb3 { width: 200px; height: 200px; background: #b07dd6; top: 50%; left: 55%; animation-duration: 16s; animation-delay: -6s; }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(35px,-25px) scale(1.07); }
      66%  { transform: translate(-15px,18px) scale(0.95); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* ── Header ── */
    header {
      position: fixed; top: 0; width: 100%; z-index: 20;
      padding: 1.1rem 2rem;
      background: rgba(30,6,42,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(107,33,133,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeDown 0.5s ease both;
    }
    .logo {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, #b07dd6, #7c2d9e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo i { -webkit-text-fill-color: #b07dd6; }

    /* ── Card ── */
    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      border-radius: 22px;
      padding: 2.5rem 2.2rem;
      border: 1px solid rgba(107,33,133,0.55);
      box-shadow: 0 0 60px rgba(192,38,211,0.1), 0 24px 60px rgba(0,0,0,0.35);
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
      margin-top: 2rem;
    }

    .card-header { text-align: center; margin-bottom: 1.8rem; padding-bottom: 1.2rem; border-bottom: 1px solid rgba(107,33,133,0.35); }
    .card-title { font-size: 1.35rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .card-title i { color: var(--secondary); }
    .card-sub { margin-top: 0.45rem; font-size: 0.82rem; color: var(--gray); font-style: italic; }

    /* ── Tabs ── */
    .tabs {
      display: flex; margin-bottom: 1.6rem;
      border-radius: 10px; overflow: hidden;
      background: rgba(19,1,24,0.5);
      border: 1px solid rgba(107,33,133,0.4);
    }
    .tab {
      flex: 1; padding: 0.7rem;
      text-align: center; cursor: pointer;
      font-weight: 600; font-size: 0.9rem;
      transition: all 0.3s; color: var(--gray);
    }
    .tab.active { background: linear-gradient(135deg,#7c2d9e,#5b1a80); color: white; }
    .tab:not(.active):hover { background: rgba(192,38,211,0.1); color: var(--light); }

    /* ── Form ── */
    .form-group { margin-bottom: 1.3rem; }
    .form-label { display: flex; align-items: center; gap: 0.45rem; margin-bottom: 0.45rem; font-size: 0.88rem; font-weight: 500; color: var(--gray-light); }
    .form-label i { color: var(--primary); }

    .input-wrap { position: relative; }
    .form-input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.7rem;
      border-radius: 10px;
      border: 1.5px solid rgba(107,33,133,0.45);
      background: rgba(19,1,24,0.55);
      color: var(--light);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s;
    }
    .input-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--gray); transition: color 0.3s; pointer-events: none; }
    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(192,38,211,0.2), 0 0 20px rgba(192,38,211,0.08); }
    .input-wrap:focus-within .input-icon { color: var(--primary); }
    .form-input::placeholder { color: var(--gray); }

    /* ── Button ── */
    .form-btn {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #7c2d9e, #5b1a80);
      color: white; border: none;
      padding: 0.9rem 1.5rem;
      border-radius: 10px; cursor: pointer;
      font-weight: 700; font-size: 0.97rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(192,38,211,0.3);
    }
    .form-btn::after {
      content: ''; position: absolute; top: -50%; left: -60%;
      width: 40%; height: 200%;
      background: rgba(255,255,255,0.15); transform: skewX(-20deg);
      transition: left 0.5s;
    }
    .form-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(192,38,211,0.45); }
    .form-btn:hover::after { left: 120%; }
    .form-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    /* ── Error ── */
    .error {
      margin-top: 1rem; padding: 0.75rem;
      border-radius: 8px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      font-size: 0.87rem;
      display: flex; align-items: center; gap: 0.5rem;
      animation: fadeUp 0.3s ease;
    }

    /* ── Footer ── */
    .page-footer {
      position: fixed; bottom: 0; width: 100%; z-index: 10;
      text-align: center; padding: 0.9rem;
      font-size: 0.8rem; color: var(--gray);
      background: rgba(30,6,42,0.8);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(107,33,133,0.3);
    }

    /* ── Animations ── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; margin: 1rem; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="bg-canvas">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <header>
    <div class="logo"><i class="fas fa-bolt"></i> Vrush-mini</div>
  </header>

  <div class="login-card">
    <div class="card-header">
      <h2 class="card-title"><i class="fas fa-user-shield"></i> User Authentication</h2>
      <p class="card-sub">"Silent but steadfast"</p>
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-login">Login</div>
      <div class="tab" id="tab-register">Create Account</div>
    </div>

    <div class="form-group">
      <label class="form-label"><i class="fas fa-user"></i> Username</label>
      <div class="input-wrap">
        <i class="input-icon fas fa-at"></i>
        <input class="form-input" type="text" id="username" placeholder="Enter your username" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label"><i class="fas fa-lock"></i> Password</label>
      <div class="input-wrap">
        <i class="input-icon fas fa-key"></i>
        <input class="form-input" type="password" id="password" placeholder="Enter your password" />
      </div>
    </div>

    <button class="form-btn" id="submit-btn">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>

    <div class="error" id="error" style="display:none;">
      <i class="fas fa-exclamation-circle"></i>
      <span id="error-text"></span>
    </div>

    <p style="text-align:center; margin-top:1.5rem; font-size:0.8rem; color:var(--gray);">
      &copy; 2025 <span style="color:var(--secondary)">Vrush-mini</span> | All Rights Reserved
    </p>
  </div>

  <div class="page-footer">
    ⚡ <strong style="color:var(--secondary)">Vrush-mini</strong> &nbsp;·&nbsp; by RaVenn-h &amp; 04 &copy; 2025
  </div>

  <script>
    let mode = "login";

    document.getElementById("tab-login").onclick = () => { mode = "login"; setActiveTab(); };
    document.getElementById("tab-register").onclick = () => { mode = "register"; setActiveTab(); };

    function setActiveTab() {
      document.getElementById("tab-login").classList.toggle("active", mode === "login");
      document.getElementById("tab-register").classList.toggle("active", mode === "register");
      const btn = document.getElementById("submit-btn");
      btn.innerHTML = mode === "login"
        ? '<i class="fas fa-sign-in-alt"></i> Login'
        : '<i class="fas fa-user-plus"></i> Create Account';
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById("error");
      document.getElementById("error-text").textContent = msg;
      el.style.display = "flex";
    }
    function hideError() { document.getElementById("error").style.display = "none"; }

    function submit() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      hideError();
      if (!user || !pass) { showError("Both fields are required."); return; }

      const btn = document.getElementById("submit-btn");
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
      btn.disabled = true;

      fetch(mode === "login" ? "/login" : "/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: user, password: pass }),
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) window.location.href = "/dashboard";
        else showError(data.message || "Invalid credentials.");
      })
      .catch(() => showError("Something went wrong. Try again."))
      .finally(() => { btn.innerHTML = orig; btn.disabled = false; });
    }

    document.getElementById("submit-btn").addEventListener("click", submit);
    ["username","password"].forEach(id =>
      document.getElementById(id).addEventListener("keypress", e => { if (e.key === "Enter") submit(); })
    );
  </script>
</body>
</html>
