<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vrush-mini — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #7c2d9e;
      --primary-dark: #5b1a80;
      --secondary: #b07dd6;
      --danger: #ef4444;
      --dark: #1e062a;
      --darker: #130118;
      --light: #f8fafc;
      --gray: #a367b8;
      --gray-light: #d8a8ec;
      --card-bg: rgba(43, 13, 61, 0.72);
      --card-border: #6b2185;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--darker);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.25; animation: drift linear infinite; }
    .orb1 { width: 500px; height: 500px; background: #7c2d9e; top: -180px; right: -100px; animation-duration: 22s; }
    .orb2 { width: 350px; height: 350px; background: #7c3aed; bottom: -100px; left: -80px; animation-duration: 18s; animation-direction: reverse; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(30px,-20px) scale(1.06); }
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      padding: 1.2rem 2rem;
      background: rgba(30,6,42,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(107,33,133,0.45);
      display: flex; align-items: center; justify-content: space-between;
      animation: fadeDown 0.5s ease both;
    }
    .logo {
      display: flex; align-items: center; gap: 0.65rem;
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, #b07dd6, #7c2d9e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo i { -webkit-text-fill-color: #b07dd6; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .logout-btn {
      padding: 0.45rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(107,33,133,0.5);
      background: rgba(192,38,211,0.08);
      color: var(--gray-light);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .logout-btn:hover { background: rgba(192,38,211,0.2); color: var(--light); }

    /* ── Content ── */
    .list-container {
      position: relative; z-index: 10;
      padding: 2rem;
      flex: 1;
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 1rem; margin-bottom: 2rem;
      animation: fadeUp 0.5s ease 0.1s both;
    }
    .stat-card {
      flex: 1;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 14px;
      padding: 1.1rem 1.3rem;
      border: 1px solid rgba(107,33,133,0.45);
      display: flex; align-items: center; gap: 0.9rem;
      transition: all 0.3s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(192,38,211,0.15); }
    .stat-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(192,38,211,0.2), rgba(162,28,175,0.3));
      border: 1px solid rgba(107,33,133,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: var(--secondary);
    }
    .stat-info .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--light); }
    .stat-info .stat-label { font-size: 0.75rem; color: var(--gray); margin-top: 0.1rem; }

    /* ── Section header ── */
    .section-title {
      font-size: 1rem; font-weight: 600;
      color: var(--gray-light);
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.5rem;
      animation: fadeUp 0.5s ease 0.15s both;
    }
    .section-title i { color: var(--primary); }

    /* ── Number cards ── */
    .number-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 14px;
      padding: 1.1rem 1.4rem;
      margin-bottom: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(107,33,133,0.45);
      transition: all 0.3s;
      animation: fadeUp 0.5s ease both;
    }
    .number-card:hover { transform: translateX(4px); box-shadow: 0 6px 24px rgba(192,38,211,0.15); border-color: rgba(192,38,211,0.5); }

    .number-left { display: flex; align-items: center; gap: 0.9rem; }
    .num-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #7c2d9e, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: white; font-weight: 700;
      flex-shrink: 0;
    }
    .num-info .num-text { font-size: 1rem; font-weight: 600; }
    .num-info .num-sub { font-size: 0.75rem; color: var(--gray); margin-top: 0.1rem; }
    .connected-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.72rem;
      background: rgba(74,222,128,0.12);
      color: #4ade80;
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 20px;
      padding: 0.15rem 0.5rem;
      margin-top: 0.2rem;
    }
    .connected-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; animation: pulse-green 2s infinite; }
    @keyframes pulse-green {
      0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
      70% { box-shadow: 0 0 0 5px rgba(74,222,128,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
    }

    .delete-btn {
      background: rgba(239,68,68,0.1);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.83rem;
      display: flex; align-items: center; gap: 0.4rem;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }
    .delete-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Empty state ── */
    .empty-msg {
      text-align: center;
      padding: 3rem 2rem;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 16px;
      border: 1px dashed rgba(107,33,133,0.5);
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      animation: fadeUp 0.5s ease both;
    }
    .empty-msg .empty-icon { font-size: 2.5rem; color: rgba(192,38,211,0.4); }
    .empty-msg p { color: var(--gray); font-size: 0.9rem; }
    .empty-cta {
      margin-top: 0.5rem;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c2d9e, #5b1a80);
      color: white; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.88rem;
      transition: all 0.2s;
    }
    .empty-cta:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── FAB ── */
    .add-button {
      position: fixed; bottom: 28px; right: 28px;
      background: linear-gradient(135deg, #7c2d9e, #7c3aed);
      color: white; font-size: 1.3rem;
      width: 56px; height: 56px;
      border-radius: 50%; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(192,38,211,0.4);
      transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .add-button::before {
      content: ''; position: absolute;
      inset: -4px; border-radius: 50%;
      border: 2px solid rgba(192,38,211,0.4);
      animation: ring-pulse 2s infinite;
    }
    .add-button:hover { transform: scale(1.1); box-shadow: 0 8px 30px rgba(192,38,211,0.6); }
    @keyframes ring-pulse { 0% { transform:scale(1); opacity:.8; } 100% { transform:scale(1.6); opacity:0; } }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 10;
      text-align: center; padding: 1.1rem;
      font-size: 0.8rem; color: var(--gray);
      background: rgba(30,6,42,0.82);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(107,33,133,0.3);
    }

    /* ── Animations ── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 480px) {
      .list-container { padding: 1.2rem; }
      .stats-bar { flex-direction: column; }
      .number-card { flex-direction: column; gap: 0.8rem; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="bg-canvas">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
  </div>

  <header>
    <div class="logo"><i class="fas fa-bolt"></i> Vrush-mini</div>
    <div class="header-right">
      <button class="logout-btn" onclick="window.location.href='/logout'">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </header>

  <div class="list-container">

    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-link"></i></div>
        <div class="stat-info">
          <div class="stat-val" id="pairCountVal">—</div>
          <div class="stat-label">Active Pairings</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-shield-alt"></i></div>
        <div class="stat-info">
          <div class="stat-val">2</div>
          <div class="stat-label">Max Allowed</div>
        </div>
      </div>
    </div>

    <div class="section-title"><i class="fas fa-mobile-alt"></i> Paired Numbers</div>
    <div id="pairedList"></div>
  </div>

  <button class="add-button" onclick="window.location.href='/home'" title="Add new pairing">
    <i class="fas fa-plus"></i>
  </button>

  <footer>
    ⚡ <strong style="color:var(--secondary)">Vrush-mini</strong> &nbsp;·&nbsp; by RaVenn-h &amp; 04 &copy; 2025
  </footer>

  <script>
    function loadUserPairings() {
      fetch('/me')
        .then(r => r.json())
        .then(data => {
          const numbers = data.pairings || [];
          document.getElementById("pairCountVal").textContent = numbers.length + "/2";

          const list = document.getElementById("pairedList");
          list.innerHTML = "";

          if (numbers.length === 0) {
            list.innerHTML = `
              <div class="empty-msg">
                <div class="empty-icon"><i class="fas fa-inbox"></i></div>
                <p>No pairings yet.<br>Click + to get started.</p>
                <button class="empty-cta" onclick="window.location.href='/home'">
                  <i class="fas fa-plus"></i> Add Number
                </button>
              </div>`;
            return;
          }

          numbers.forEach((num, idx) => {
            const div = document.createElement("div");
            div.className = "number-card";
            div.style.animationDelay = (idx * 0.07) + "s";
            div.innerHTML = `
              <div class="number-left">
                <div class="num-avatar">${num.charAt(0)}</div>
                <div class="num-info">
                  <div class="num-text">+${num}</div>
                  <div class="connected-badge"><div class="connected-dot"></div> connected</div>
                </div>
              </div>
              <button class="delete-btn" id="del-${num}">
                <i class="fas fa-trash-alt"></i> Remove
              </button>`;
            list.appendChild(div);

            document.getElementById(`del-${num}`).onclick = () => {
              if (!confirm(`Remove pairing for +${num}?`)) return;
              const btn = document.getElementById(`del-${num}`);
              btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
              btn.disabled = true;
              fetch(`/paired/${num}`, { method: "DELETE" })
                .then(r => r.json())
                .then(resp => {
                  if (resp.status) loadUserPairings();
                  else { alert("Failed to delete."); btn.innerHTML = '<i class="fas fa-trash-alt"></i> Remove'; btn.disabled = false; }
                })
                .catch(() => { alert("Error."); btn.innerHTML = '<i class="fas fa-trash-alt"></i> Remove'; btn.disabled = false; });
            };
          });
        })
        .catch(() => {
          document.getElementById("pairedList").innerHTML = `
            <div class="empty-msg">
              <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
              <p>Failed to load. Please refresh.</p>
            </div>`;
        });
    }

    loadUserPairings();
  </script>
</body>
</html>
