<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vrush-mini Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #c026d3;
      --primary-dark: #a21caf;
      --secondary: #e879f9;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #1e062a;
      --darker: #130118;
      --light: #f8fafc;
      --gray: #a367b8;
      --gray-light: #d8a8ec;
      --card-bg: #2b0d3d;
      --card-border: #6b2185;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: var(--darker);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    header {
      padding: 1.5rem 2rem;
      background: var(--dark);
      color: var(--light);
      box-shadow: 0 4px 12px rgba(80, 0, 100, 0.25);
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    .logo i {
      color: var(--primary);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 12px rgba(80, 0, 100, 0.2);
      border: 1px solid var(--card-border);
      margin-top: 2rem;
    }
    
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--card-border);
    }
    
    .card-title {
      font-size: 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .card-title i {
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .form-label i {
      color: var(--primary);
    }

    .form-input {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: var(--dark);
      color: var(--light);
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(192, 38, 211, 0.2);
    }

    .form-input::placeholder {
      color: var(--gray);
    }

    .form-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.9rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      width: 100%;
    }
    
    .form-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .error {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: var(--gray);
      position: absolute;
      bottom: 0;
      width: 100%;
      background: var(--dark);
      border-top: 1px solid var(--card-border);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
        margin: 0 1rem;
      }
      
      header {
        padding: 1rem;
      }
      
      .logo {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <i class="fas fa-bolt"></i>
      <span>Vrush-mini Admin Panel</span>
    </div>
  </header>

  <div class="login-card">
    <div class="card-header">
      <h2 class="card-title">
        <i class="fas fa-user-shield"></i>
        Admin Authentication
      </h2>
    </div>
    
    <div class="form-group">
      <label class="form-label" for="username">
        <i class="fas fa-user"></i>
        Admin Username:
      </label>
      <input class="form-input" type="text" id="username" placeholder="Enter admin username" />
    </div>

    <button class="form-btn" onclick="login()">
      <i class="fas fa-sign-in-alt"></i>
      Login
    </button>
    
    <div class="error" id="errorMsg" style="display: none;">
      <i class="fas fa-exclamation-circle"></i>
      <span id="error-text"></span>
    </div>
  </div>

  <div class="footer">
<i class="fab fa-js" style="color: #ef4444"></i> by RaVenn-h and 04 &copy; 2025
  </div>

  <script>
    function showError(message) {
      const errorElement = document.getElementById("errorMsg");
      const errorText = document.getElementById("error-text");
      
      errorText.textContent = message;
      errorElement.style.display = "flex";
    }

    function hideError() {
      document.getElementById("errorMsg").style.display = "none";
    }

    function login() {
      const username = document.getElementById("username").value.trim();
      
      hideError();

      if (!username) {
        showError("Please enter the admin username.");
        return;
      }

      // Show loading state
      const loginBtn = document.querySelector(".form-btn");
      const originalText = loginBtn.innerHTML;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
      loginBtn.disabled = true;

      fetch("/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password: "vrush_admin" }) // auto-password
      })
      .then(res => {
        if (!res.ok) throw new Error("Invalid login");
        return res.json();
      })
      .then(data => {
        if (data.success) {
          window.location.href = "/admin";
        } else {
          showError(data.message || "Login failed.");
        }
      })
      .catch(() => {
        showError("Invalid admin credentials.");
      })
      .finally(() => {
        loginBtn.innerHTML = originalText;
        loginBtn.disabled = false;
      });
    }
    
    // Add Enter key support
    document.getElementById('username').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        login();
      }
    });
  </script>
</body>
</html>
